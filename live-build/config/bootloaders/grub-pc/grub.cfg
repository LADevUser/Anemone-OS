source /boot/grub/config.cfg

# Primary live boot. live-build replaces these placeholders during the build.
menuentry "Anemone OS – Utforska utan att lämna några spår" --hotkey=l {
	linux	@KERNEL_LIVE@ @APPEND_LIVE@
	initrd	@INITRD_LIVE@
}

menuentry "Anemone OS – felsäkert läge" {
	linux	@KERNEL_LIVE@ @LB_BOOTAPPEND_LIVE_FAILSAFE@
	initrd	@INITRD_LIVE@
}

submenu "Verktyg..." --hotkey=v {

	source /boot/grub/theme.cfg

	if [ "${grub_platform}" = "efi" ]; then
		menuentry "UEFI-inställningar" --hotkey=u {
			fwsetup
		}
	fi

	if @ENABLE_VERIFY_CHECKSUMS@; then
		menuentry "Verifiera startmediets integritet" {
			linux	@KERNEL_LIVE@ @APPEND_VERIFY_CHECKSUMS@
			initrd	@INITRD_LIVE@
		}
	fi
}
