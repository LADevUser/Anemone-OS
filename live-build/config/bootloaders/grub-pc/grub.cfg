source /boot/grub/anemone-build-stamp.cfg
source /boot/grub/config.cfg

menuentry "Utforska Anemone utan att lämna några spår" --hotkey=u {
  linux  @KERNEL_LIVE@ @APPEND_LIVE@
  initrd @INITRD_LIVE@
}

menuentry "Gör Anemone till din egen plats" --hotkey=i {
  linux  @KERNEL_LIVE@ @APPEND_LIVE@
  initrd @INITRD_LIVE@
}

menuentry "Ta en välförtjänt paus. Anemone väntar tills du är redo" --hotkey=s {
  halt
}
