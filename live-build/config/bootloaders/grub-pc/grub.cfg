  source /boot/grub/anemone-build-stamp.cfg
  source /boot/grub/config.cfg

  # Live boot — live-build injicerar rätt kernel/initrd/params här
  @LINUX_LIVE@

  submenu "Verktyg..." --hotkey=v {
    source /boot/grub/theme.cfg

    if [ "${grub_platform}" = "efi" ]; then
      menuentry "UEFI-inställningar" --hotkey=u {
        fwsetup
      }
    fi

    if @ENABLE_VERIFY_CHECKSUMS@; then
      menuentry "Verifiera startmediets integritet" {
        linux @KERNEL_LIVE@ @APPEND_VERIFY_CHECKSUMS@
        initrd @INITRD_LIVE@
      }
    fi
  }
